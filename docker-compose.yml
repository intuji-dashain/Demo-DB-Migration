services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver_source
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD}
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-C", "-X", "-V", "1", "-S", "localhost", "-U", "sa", "-P", "${MSSQL_SA_PASSWORD}", "-Q", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - migration_net

  postgres:
    image: postgres:16-alpine
    container_name: postgres_destination
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - migration_net

  migration-engine:
    build:
      context: .
      dockerfile: Dockerfile.migration
    container_name: migration_worker
    environment:
      - MSSQL_HOST=sqlserver
      - MSSQL_USER=${MSSQL_USER}
      - MSSQL_PASSWORD=${MSSQL_SA_PASSWORD}
      - MSSQL_DB=${MSSQL_DB}
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      # Migration control flags
      - DRY_RUN=${DRY_RUN:-false}
      - SKIP_VALIDATION=${SKIP_VALIDATION:-false}
      - CONTINUE_ON_ERROR=${CONTINUE_ON_ERROR:-false}
    depends_on:
      sqlserver:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - migration_net
    # Override command to run seeding or migration
    # Use: docker compose run migration-engine python seed.py
    # Or:  docker compose run migration-engine python migrate.py

networks:
  migration_net:
    driver: bridge